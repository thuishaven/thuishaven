name: Deploy MCP server

# Auto-deploys on push to main when MCP-affecting files change; also runnable
# manually via the Actions tab (see docs/deployment.md).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - "patterns/**"
      - "schema/**"
      - ".github/workflows/deploy-mcp.yml"

jobs:
  deploy:
    name: Test, bundle, and deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (builds and validates the patterns bundle)
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
