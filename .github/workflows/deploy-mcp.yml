name: Deploy MCP server

# Manual trigger only for now — switch to the push trigger below once the
# Cloudflare account is set up and CI deployments are deliberately enabled
# (see docs/deployment.md):
#
#   push:
#     branches: [main]
#     paths:
#       - "mcp-server/**"
#       - "patterns/**"
#       - "schema/**"
#       - ".github/workflows/deploy-mcp.yml"
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Test, bundle, and deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (builds and validates the patterns bundle)
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
